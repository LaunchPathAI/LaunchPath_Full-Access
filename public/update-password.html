<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LaunchPath AI — Update Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.js"></script>

  <style>
    :root {
      --bg-main: #020617;
      --bg-card: #0f172a;
      --accent-cyan: #22d3ee;
      --accent-blue: #38bdf8;
      --text-main: #f9fafb;
      --text-muted: #94a3b8;
      --border-subtle: #1e293b;
      --font-sans: system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg-main) 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      text-align: center;
    }
    .auth-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
    .auth-sub { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; font-size: 0.85rem; margin-bottom: 6px; color: var(--text-muted); font-weight: 600; }
    .input-group input {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-subtle);
      border-radius: 12px; color: #fff;
      font-family: inherit; font-size: 0.95rem;
      transition: border-color 0.15s;
    }
    .input-group input:focus { outline: none; border-color: var(--accent-cyan); background: rgba(255,255,255,0.06); }
    .auth-btn {
      width: 100%; padding: 12px;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      color: #04131f; font-weight: 700; font-size: 1rem;
      cursor: pointer; font-family: inherit;
      transition: filter 0.15s, transform 0.1s;
    }
    .auth-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .msg { margin-top: 16px; font-size: 0.85rem; font-weight: 600; display: none; }
    .msg.error { color: #f87171; display: block; }
    .msg.success { color: #4ade80; display: block; }
  </style>
</head>
<body>

  <div class="auth-card">
    <h1 class="auth-title">Set New Password</h1>
    <p class="auth-sub">Please enter your new password below.</p>
    
    <form id="updateForm">
      <div class="input-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" required placeholder="••••••••" />
      </div>
      <button type="submit" class="auth-btn" id="updateBtn">Update Password</button>
      <div id="statusMsg" class="msg"></div>
    </form>
  </div>

  <script>
    (async function() {
      // 1. Initialize Supabase
      const _supabase = supabase.createClient(LP_CONFIG.SUPABASE_URL, LP_CONFIG.SUPABASE_ANON_KEY);
      
      const form = document.getElementById('updateForm');
      const btn = document.getElementById('updateBtn');
      const msg = document.getElementById('statusMsg');

      // 2. Wait for Supabase to automatically process the hash in the URL and set the session
      const { data: { session }, error: sessionError } = await _supabase.auth.getSession();
      
      // Note: If session is null right away, Supabase is still parsing the hash. 
      // Supabase's onAuthStateChange will fire when the recovery session is established.
      _supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'PASSWORD_RECOVERY') {
          console.log("Recovery mode active.");
        }
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.className = 'msg';
        msg.textContent = '';
        
        const newPassword = document.getElementById('newPassword').value;
        if (newPassword.length < 6) {
          msg.className = 'msg error';
          msg.textContent = 'Password must be at least 6 characters.';
          return;
        }

        btn.textContent = 'Updating...';
        btn.disabled = true;

        // 3. Update the user's password
        const { error } = await _supabase.auth.updateUser({
          password: newPassword
        });

        if (error) {
          msg.className = 'msg error';
          msg.textContent = error.message;
          btn.textContent = 'Update Password';
          btn.disabled = false;
        } else {
          msg.className = 'msg success';
          msg.textContent = 'Password updated successfully! Redirecting...';
          setTimeout(() => {
            window.location.href = 'student-workplace.html';
          }, 2000);
        }
      });
    })();
  </script>
</body>
</html>
