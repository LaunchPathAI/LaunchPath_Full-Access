  <title>LaunchPath AI — Executive Summary</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html,
    body,
    #root {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #020617;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      color: #f3f4f6;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Cinematic timing curves */
    :root {
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
    }

    /* Display type — calm + tight tracking */
    .display {
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-weight: 200;
      letter-spacing: -0.04em;
      font-feature-settings: "tnum" 1;
    }

    .display-bold {
      font-weight: 600;
      letter-spacing: -0.045em;
    }

    .micro {
      font-family: "SF Mono", ui-monospace, "Menlo", monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .label-tiny {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Scene base — fade between scenes */
    .scene {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 700ms var(--ease-in-out);
    }

    .scene.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Reveal primitives (driven by .play class) */
    .rv {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 1100ms var(--ease-out-expo), transform 1100ms var(--ease-out-expo);
    }

    .play .rv {
      opacity: 1;
      transform: translateY(0);
    }

    .play .rv-d1 {
      transition-delay: 150ms;
    }

    .play .rv-d2 {
      transition-delay: 350ms;
    }

    .play .rv-d3 {
      transition-delay: 600ms;
    }

    .play .rv-d4 {
      transition-delay: 850ms;
    }

    .play .rv-d5 {
      transition-delay: 1100ms;
    }

    .play .rv-d6 {
      transition-delay: 1350ms;
    }

    .play .rv-d7 {
      transition-delay: 1600ms;
    }

    .play .rv-d8 {
      transition-delay: 1850ms;
    }

    .rv-soft {
      opacity: 0;
      transition: opacity 1300ms var(--ease-out-expo);
    }

    .play .rv-soft {
      opacity: 1;
    }

    .rv-scale {
      opacity: 0;
      transform: scale(.94);
      transition: opacity 1100ms var(--ease-out-expo), transform 1300ms var(--ease-out-expo);
    }

    .play .rv-scale {
      opacity: 1;
      transform: scale(1);
    }

    /* Aurora background */
    .aurora {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .aurora::before,
    .aurora::after {
      content: "";
      position: absolute;
      width: 80vmax;
      height: 80vmax;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .5;
      animation: drift 22s ease-in-out infinite alternate;
    }

    .aurora::before {
      background: radial-gradient(circle, var(--accent-1) 0%, transparent 60%);
      top: -20vmax;
      left: -20vmax;
    }

    .aurora::after {
      background: radial-gradient(circle, var(--accent-2) 0%, transparent 60%);
      bottom: -25vmax;
      right: -25vmax;
      animation-delay: -8s;
    }

    @keyframes drift {
      0% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(40px, -30px) scale(1.08);
      }

      100% {
        transform: translate(-30px, 40px) scale(.96);
      }
    }

    /* Vignette */
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(2, 6, 23, .7) 100%);
    }

    /* Starfield */
    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .stars .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .85);
      animation: twinkle 4s ease-in-out infinite;
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: .15;
      }

      50% {
        opacity: .9;
      }
    }

    /* Grid background */
    .gridbg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(56, 189, 248, .08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, .08) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    }

    /* Animated underline */
    .draw-line {
      width: 0;
      transition: width 1400ms var(--ease-out-expo);
    }

    .play .draw-line {
      width: var(--w, 100%);
    }

    /* Ring (SVG) */
    .ring-track {
      stroke: rgba(255, 255, 255, .08);
    }

    .ring-fill {
      stroke-dasharray: 251.2;
      stroke-dashoffset: 251.2;
      transition: stroke-dashoffset 2200ms var(--ease-out-expo);
    }

    .play .ring-fill {
      stroke-dashoffset: var(--off, 0);
    }

    /* Hero score giant numeral */
    .hero-num {
      font-size: clamp(80px, 11vw, 160px);
      line-height: 0.85;
      font-weight: 200;
      letter-spacing: -0.06em;
      background: linear-gradient(180deg, #ffffff 0%, var(--accent-1) 70%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 80px rgba(34, 211, 238, .15);
    }

    /* Tier card */
    .tier {
      transition: all 900ms var(--ease-out-expo);
      transition-delay: var(--td, 0ms);
    }

    /* Insight quote */
    .quote-mark {
      font-family: "SF Pro Display", Georgia, serif;
      font-size: 200px;
      line-height: 0;
      font-weight: 300;
      color: var(--accent-1);
      opacity: .25;
    }

    /* Bottom chrome */
    .chrome {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 24px 40px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 50;
      background: linear-gradient(0deg, rgba(2, 6, 23, .85), transparent);
      transition: opacity 400ms ease;
    }

    .chrome.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Scrubber */
    .scrub {
      flex: 1;
      height: 2px;
      background: rgba(255, 255, 255, .1);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }

    .scrub-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      border-radius: 2px;
      transition: width 100ms linear;
    }

    .scrub-marker {
      position: absolute;
      top: -3px;
      width: 1px;
      height: 8px;
      background: rgba(255, 255, 255, .25);
    }

    /* Top chrome */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 50;
      pointer-events: none;
      transition: opacity 400ms ease;
    }

    .topbar.hidden {
      opacity: 0;
    }

    .topbar>* {
      pointer-events: auto;
    }

    /* Pill button */
    .pill {
      padding: 9px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .18);
      background: rgba(15, 23, 42, .5);
      color: rgba(234, 242, 255, .92);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s var(--ease-out-quart);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      letter-spacing: 0.02em;
    }

    .pill:hover {
      border-color: var(--accent-1);
      background: rgba(15, 23, 42, .75);
    }

    .pill-primary {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      color: #020617;
      border-color: transparent;
      font-weight: 600;
    }

    .pill-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(34, 211, 238, .3);
    }

    /* Pin chip */
    .pin-chip {
      position: relative;
      padding: 18px 22px 18px 46px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .1);
      background: rgba(15, 23, 42, .4);
      backdrop-filter: blur(12px);
      cursor: pointer;
      transition: all .3s var(--ease-out-quart);
      text-align: left;
    }

    .pin-chip:hover {
      border-color: var(--accent-1);
      background: rgba(15, 23, 42, .6);
    }

    .pin-chip.pinned {
      border-color: var(--accent-1);
      background: rgba(34, 211, 238, .08);
    }

    .pin-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, .3);
      transition: all .25s var(--ease-out-quart);
      display: grid;
      place-items: center;
    }

    .pin-chip.pinned .pin-icon {
      background: var(--accent-1);
      border-color: var(--accent-1);
    }

    .pin-chip.pinned .pin-icon::after {
      content: "✓";
      color: #020617;
      font-size: 11px;
      font-weight: 800;
    }

    /* Match row */
    .match-row,
    .match-row-grid {
      display: grid;
      grid-template-columns: 32px 1fr auto auto;
      gap: 24px;
      align-items: center;
      padding: 18px 0;
      border-top: 1px solid rgba(255, 255, 255, .06);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 800ms var(--ease-out-expo), transform 800ms var(--ease-out-expo);
      transition-delay: var(--md, 0ms);
    }

    .play .match-row,
    .play .match-row-grid {
      opacity: 1;
      transform: translateY(0);
    }

    /* Bar fill (pillar) */
    .pillar-bar {
      height: 3px;
      background: rgba(255, 255, 255, .08);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .pillar-bar>span {
      position: absolute;
      inset: 0;
      transform-origin: left;
      transform: scaleX(0);
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      transition: transform 1800ms var(--ease-out-expo);
      transition-delay: var(--bd, 0ms);
    }

    .play .pillar-bar>span {
      transform: scaleX(var(--bw, 1));
    }

    /* Percentile dot row */
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .15);
      transition: all 900ms var(--ease-out-expo);
      transition-delay: var(--dd, 0ms);
    }

    .dot.you {
      width: 14px;
      height: 14px;
      background: var(--accent-1);
      box-shadow: 0 0 24px var(--accent-1);
    }

    .play .dot.dim {
      opacity: .4;
    }

    /* Caret blink */
    .caret {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent-1);
      margin-left: 4px;
      vertical-align: text-bottom;
      animation: blink 1s steps(2) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* Lever arrow */
    .arrow-track {
      position: relative;
      height: 1px;
      background: rgba(255, 255, 255, .15);
      overflow: visible;
    }

    .arrow-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      width: 0;
      transition: width 1400ms var(--ease-out-expo);
      transition-delay: 400ms;
    }

    .play .arrow-fill {
      width: 100%;
    }

    .arrow-head {
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translate(0, -50%) scale(0);
      width: 0;
      height: 0;
      border-left: 8px solid var(--accent-2);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      transition: transform 300ms var(--ease-out-expo);
      transition-delay: 1700ms;
    }

    .play .arrow-head {
      transform: translate(0, -50%) scale(1);
    }

    /* Remove tailwind preflight from body color */
    .accent-text {
      color: var(--accent-1);
    }

    .accent-text-2 {
      color: var(--accent-2);
    }

    /* Replay overlay */
    .end-cta {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 60;
      pointer-events: none;
    }

    @media print {

      .chrome,
      .topbar,
      .scene:not(.active),
      [style*="position:fixed"] {
        display: none !important;
      }

      body {
        background: white !important;
      }

      .scene.active {
        position: relative !important;
        opacity: 1 !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    function useTweaks(defaults) {
      const [t, setT] = useState(defaults);
      const setTweak = (k, v) => setT(prev => ({ ...prev, [k]: v }));
      return [t, setTweak];
    }
    function TweaksPanel({ children }) { return null; }
    function TweakSection() { return null; }
    function TweakRadio() { return null; }
    function TweakSlider() { return null; }
    function TweakText() { return null; }
    function TweakToggle() { return null; }
    function TweakButton() { return null; }

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(e) { return { error: e }; }
      render() {
        if (this.state.error) {
          return (
            <div style={{ position: "fixed", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "#020617", color: "white", padding: 40, textAlign: "center" }}>
              <div style={{ fontSize: 32, marginBottom: 16 }}>⚠️</div>
              <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 12 }}>Something went wrong loading your summary</div>
              <div style={{ fontSize: 13, color: "rgba(203,213,245,.6)", maxWidth: 480, marginBottom: 32 }}>{this.state.error.message}</div>
              <a href="student-workplace.html" style={{ padding: "10px 24px", borderRadius: 999, background: "rgba(34,211,238,.15)", border: "1px solid rgba(34,211,238,.4)", color: "#22d3ee", textDecoration: "none", fontSize: 14 }}>← Back to workspace</a>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ── Read real student data from localStorage ──────────────────────
    function loadStudentData() {
      const SAVED_KEY = "lp_saved_items_v1";
      const PROFILE_KEY = "lp_profile_v1";

      let saved = [];
      let prof = {};
      try { saved = JSON.parse(localStorage.getItem(SAVED_KEY) || "[]"); } catch (e) { }
      try { prof = JSON.parse(localStorage.getItem(PROFILE_KEY) || "null") || {}; } catch (e) { }

      const colleges = saved.filter(x => x.type === "college");
      const essays = saved.filter(x => x.type === "essay");

      // Thresholds
      const MIN_COLLEGES = 3, MIN_ESSAYS = 1;
      const hasProfile = !!(prof.gpa || prof.sat);
      const unlocked = colleges.length >= MIN_COLLEGES && essays.length >= MIN_ESSAYS && hasProfile;

      // GPA / SAT
      const gpa = parseFloat(prof.gpa) || null;
      const sat = parseInt(prof.sat, 10) || null;

      // Overall fit score — weighted formula from real inputs
      // Academic: 50% weight (GPA + SAT), Progress: 30% (colleges+essays), Profile: 20%
      let academicScore = 70; // default mid
      if (gpa && sat) {
        const gpaScore = Math.min(100, Math.round(((gpa - 2.0) / 2.0) * 100));
        const satScore = Math.min(100, Math.round(((sat - 800) / 800) * 100));
        academicScore = Math.round(gpaScore * 0.55 + satScore * 0.45);
      } else if (gpa) {
        academicScore = Math.min(100, Math.round(((gpa - 2.0) / 2.0) * 100));
      } else if (sat) {
        academicScore = Math.min(100, Math.round(((sat - 800) / 800) * 100));
      }

      const collegeScore = Math.min(100, Math.round((Math.min(colleges.length, 15) / 15) * 100));
      const essayScore = Math.min(100, Math.round((Math.min(essays.length, 5) / 5) * 100));
      const progressScore = Math.round(collegeScore * 0.6 + essayScore * 0.4);
      const profileScore = hasProfile ? 85 : 50;

      const overallScore = Math.max(40, Math.min(99,
        Math.round(academicScore * 0.50 + progressScore * 0.30 + profileScore * 0.20)
      ));

      // Pillar scores
      const pillarAcademic = academicScore;
      const pillarBrand = Math.max(45, Math.min(99, Math.round(essayScore * 0.7 + 30)));
      const pillarFinancial = Math.max(50, Math.min(95, Math.round(progressScore * 0.5 + 45)));

      // ── Real Academic Comparison Engine ──
      const COLLEGE_DB = {
        'harvard': { gpa: 4.0, sat: 1540, admit: 4, roi: '$150K' },
        'stanford': { gpa: 3.96, sat: 1530, admit: 4, roi: '$148K' },
        'mit': { gpa: 3.96, sat: 1540, admit: 4, roi: '$155K' },
        'yale': { gpa: 3.95, sat: 1530, admit: 5, roi: '$145K' },
        'princeton': { gpa: 3.95, sat: 1540, admit: 4, roi: '$140K' },
        'columbia': { gpa: 3.91, sat: 1520, admit: 4, roi: '$142K' },
        'upenn': { gpa: 3.9, sat: 1520, admit: 6, roi: '$144K' },
        'brown': { gpa: 3.94, sat: 1520, admit: 5, roi: '$135K' },
        'cornell': { gpa: 3.9, sat: 1500, admit: 7, roi: '$138K' },
        'duke': { gpa: 3.94, sat: 1520, admit: 6, roi: '$140K' },
        'uc berkeley': { gpa: 3.89, sat: 1430, admit: 11, roi: '$135K' },
        'ucla': { gpa: 3.9, sat: 1420, admit: 9, roi: '$130K' },
        'michigan': { gpa: 3.88, sat: 1440, admit: 18, roi: '$120K' },
        'nyu': { gpa: 3.8, sat: 1480, admit: 12, roi: '$125K' },
        'penn state': { gpa: 3.58, sat: 1250, admit: 55, roi: '$100K' },
        'rutgers': { gpa: 3.4, sat: 1300, admit: 66, roi: '$105K' },
        'ohio state': { gpa: 3.76, sat: 1330, admit: 53, roi: '$95K' },
        'arizona state': { gpa: 3.54, sat: 1180, admit: 88, roi: '$85K' },
        'default': { gpa: 3.7, sat: 1350, admit: 40, roi: '$110K' }
      };

      // Process all colleges to calculate their tiers properly
      const processedColleges = colleges.map((c) => {
        let nameKey = c.name ? c.name.toLowerCase() : '';
        let dbEntry = COLLEGE_DB[nameKey];
        if (!dbEntry) {
          // Fuzzy matching fallback
          const foundKey = Object.keys(COLLEGE_DB).find(k => nameKey.includes(k));
          dbEntry = foundKey ? COLLEGE_DB[foundKey] : COLLEGE_DB['default'];
        }

        // Calculate gap
        let gpaGap = gpa ? (gpa - dbEntry.gpa) : 0;
        let satGap = sat ? (sat - dbEntry.sat) : 0;

        // Normalize gaps (GPA: 0.1 ~ 10 points, SAT: 20 points ~ 10 points)
        let gpaPoints = gpaGap * 100;
        let satPoints = satGap * 0.5;

        // If one is missing, weight the other more
        let totalScore = 70; // baseline
        if (gpa && sat) {
          totalScore += (gpaPoints * 0.6) + (satPoints * 0.4);
        } else if (gpa) {
          totalScore += gpaPoints;
        } else if (sat) {
          totalScore += satPoints;
        }

        // Factor in the baseline acceptance rate (harder schools suppress the score)
        let acceptanceBonus = (dbEntry.admit - 30) * 0.3;
        totalScore += acceptanceBonus;

        let fitScore = Math.max(20, Math.min(99, Math.round(totalScore)));

        let tier = "Target";
        let admitProb = "40–60%";
        if (fitScore >= 85) { tier = "Safety"; admitProb = "80–95%"; }
        else if (fitScore <= 60) { tier = "Reach"; admitProb = "10–25%"; }

        // If it's a sub-10% admit rate, it's almost always a reach unless stats are perfect
        if (dbEntry.admit <= 15 && fitScore < 95) { tier = "Reach"; admitProb = "5–15%"; fitScore = Math.min(fitScore, 65); }

        // Override with user's saved category if available
        if (c.fit && typeof c.fit === "string") {
            let savedTier = c.fit.charAt(0).toUpperCase() + c.fit.slice(1).toLowerCase();
            if (["Safety", "Target", "Reach"].includes(savedTier)) {
                tier = savedTier;
                if (tier === "Safety") { admitProb = "80–95%"; fitScore = Math.max(fitScore, 85); }
                else if (tier === "Target") { admitProb = "40–60%"; fitScore = fitScore > 84 ? 80 : (fitScore < 61 ? 70 : fitScore); }
                else if (tier === "Reach") { admitProb = "10–25%"; fitScore = Math.min(fitScore, 60); }
            }
        }

        c.calculatedTier = tier; // save for progress bars below

    function useCounter(target, active, duration = 2200) {
      const [value, setValue] = useState(0);
      const startRef = useRef(0); const rafRef = useRef(0);
      useEffect(() => {
        if (!active) { setValue(0); return; }
        startRef.current = 0;
        const step = (t) => {
          if (!startRef.current) startRef.current = t;
          const p = Math.min(1, (t - startRef.current) / duration);
          const eased = p === 1 ? 1 : 1 - Math.pow(2, -10 * p);
          setValue(Math.round(target * eased));
          if (p < 1) rafRef.current = requestAnimationFrame(step);
        };
        rafRef.current = requestAnimationFrame(step);
        return () => cancelAnimationFrame(rafRef.current);
      }, [target, active, duration]);
      return value;
    }

    function useTypeOn(text, active, speed = 22, startDelay = 0) {
      const [out, setOut] = useState("");
      useEffect(() => {
        if (!active) { setOut(""); return; }
        let i = 0; let t1, t2;
        t1 = setTimeout(() => {
          t2 = setInterval(() => {
            i++; setOut(text.slice(0, i));
            if (i >= text.length) clearInterval(t2);
          }, speed);
        }, startDelay);
        return () => { clearTimeout(t1); clearInterval(t2); };
      }, [text, active, speed, startDelay]);
      return out;
    }

              {/* Two-col: matches + what-if */}
              <div className="rv rv-d3 grid gap-4 mb-4" style={{ gridTemplateColumns: "1.4fr 1fr" }}>
                <div style={{ padding: "20px 22px", borderRadius: 16, border: "1px solid rgba(255,255,255,.08)", background: "rgba(15,23,42,.5)" }}>
                  <div className="micro mb-4" style={{ color: "rgba(203,213,245,.55)" }}>Top College Matches</div>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead>
                      <tr style={{ borderBottom: "1px solid rgba(255,255,255,.08)" }}>
                        {["College", "Fit", "Admit %", "5yr ROI", "Type"].map(h => (
                          <th key={h} className="micro" style={{ padding: "8px 6px", textAlign: "left", color: "rgba(203,213,245,.5)" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {MATCHES.map(m => {
                        const tag = TAG_COLORS[m.tag];
                        return (
                          <tr key={m.name} style={{ borderBottom: "1px solid rgba(255,255,255,.04)" }}>
                            <td style={{ padding: "10px 6px", fontWeight: 500 }}>{m.name}</td>
                            <td style={{ padding: "10px 6px", color: "var(--accent-1)", fontWeight: 600 }}>{m.fit}</td>
                            <td style={{ padding: "10px 6px" }}>{m.admit}</td>
                            <td style={{ padding: "10px 6px", color: "#6ee7b7", fontWeight: 500 }}>{m.roi}</td>
                            <td style={{ padding: "10px 6px" }}>
                              <span style={{
                                display: "inline-block", padding: "3px 10px", borderRadius: 999,
                                fontSize: 10, fontWeight: 700,
                                background: tag.bg, border: `1px solid ${tag.bd}`, color: tag.fg,
                              }}>{m.tag}</span>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div style={{ padding: "20px 22px", borderRadius: 16, border: "1px solid rgba(255,255,255,.08)", background: "rgba(15,23,42,.5)" }}>
                  <div className="micro mb-4" style={{ color: "rgba(203,213,245,.55)" }}>What-If Impact</div>
                  {WHATIFS.map((w, i) => (
                    <div key={w.action} style={{
                      display: "flex", alignItems: "center", gap: 10,
                      padding: "9px 0", borderBottom: i < WHATIFS.length - 1 ? "1px solid rgba(255,255,255,.04)" : "none",
                      fontSize: 13,
                    }}>
                      <span style={{ fontSize: 16 }}>{w.icon}</span>
                      <span style={{ flex: 1, color: "rgba(243,244,246,.92)" }}>{w.action}</span>
                      <span className="accent-text font-medium" style={{ fontSize: 12, whiteSpace: "nowrap" }}>{w.delta}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Two-col: progress + next steps */}
              <div className="rv rv-d4 grid gap-4 mb-4" style={{ gridTemplateColumns: "1fr 1fr" }}>
                <div style={{ padding: "20px 22px", borderRadius: 16, border: "1px solid rgba(255,255,255,.08)", background: "rgba(15,23,42,.5)" }}>
                  <div className="micro mb-4" style={{ color: "rgba(203,213,245,.55)" }}>Application Progress</div>
                  {PROGRESS.map((p, i) => (
                    <div key={p.label} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 0", fontSize: 13 }}>
                      <div style={{ width: 150, color: "rgba(243,244,246,.9)" }}>{p.label}</div>
                      <div style={{ flex: 1, height: 6, background: "rgba(255,255,255,.06)", borderRadius: 999, overflow: "hidden" }}>
                        <div style={{ width: `${p.pct}%`, height: "100%", background: PROGRESS_TONE[p.tone] }} />
                      </div>
                      <div className="tabular-nums" style={{ width: 50, textAlign: "right", color: "rgba(203,213,245,.7)", fontSize: 12 }}>{p.cur}/{p.total}</div>
                    </div>
                  ))}
                </div>
                <div style={{ padding: "20px 22px", borderRadius: 16, border: "1px solid rgba(255,255,255,.08)", background: "rgba(15,23,42,.5)" }}>
                  <div className="micro mb-4" style={{ color: "rgba(203,213,245,.55)" }}>What to Focus on Next</div>
                  {SD.nextSteps.slice(0, 3).map(r => (
                    <div key={r.t} style={{
                      display: "flex", gap: 12, padding: "10px 12px", marginBottom: 8,
                      background: "rgba(15,23,42,.4)", borderRadius: 10, fontSize: 13,
                    }}>
                      <span style={{ fontSize: 16 }}>{r.i}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 600, marginBottom: 2 }}>{r.t}</div>
                        <div style={{ color: "rgba(203,213,245,.6)", fontSize: 12, lineHeight: 1.5 }}>{r.s}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Insight card */}
              <div className="rv rv-d5" style={{
                padding: "22px 26px", borderRadius: 18,
                background: "linear-gradient(135deg, rgba(34,211,238,.08), rgba(59,130,246,.06))",
                border: "1px solid rgba(34,211,238,.25)",
              }}>
                <div className="flex items-center gap-3 mb-3">
                  <span style={{ fontSize: 18 }}>✦</span>
                  <span className="font-semibold">Key Insight — Your College Readiness</span>
                  <span style={{ marginLeft: "auto", fontSize: 11, padding: "3px 10px", borderRadius: 999, background: "rgba(34,211,238,.15)", border: "1px solid rgba(34,211,238,.3)", color: "var(--accent-1)" }}>LP Insights</span>
                </div>
                <div style={{ fontSize: 14, lineHeight: 1.7, color: "rgba(226,232,240,.9)" }}>
                  {SD.insight}
                </div>
              </div>

              {/* Footer */}
              <div className="rv rv-d6 mt-8 flex items-center justify-between flex-wrap gap-3" style={{ paddingTop: 16, borderTop: "1px solid rgba(255,255,255,.06)" }}>
                <div className="micro" style={{ color: "rgba(203,213,245,.4)" }}>
                  Generated by LaunchPath AI · {SD.generatedDate}
                </div>
                <div className="flex gap-2">
                  <button className="pill" onClick={onReplay}>↻ Replay summary</button>
                  <button className="pill pill-primary" onClick={() => window.location.href = "student-workplace.html"}>Return to workspace →</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Master controller ───────────────────────────────────────────
    function PresentationMode() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const accent = ACCENTS[t.accent] || ACCENTS.cyan;
      useEffect(() => {
        document.documentElement.style.setProperty("--accent-1", accent.a1);
        document.documentElement.style.setProperty("--accent-2", accent.a2);
      }, [accent]);

      const scenes = useMemo(() => buildScenes(), []);
      const speed = t.speed || 1;

      const [sceneIdx, setSceneIdx] = useState(0);
      const [elapsed, setElapsed] = useState(0);
      const [playing, setPlaying] = useState(t.autoPlay);
      const lastTickRef = useRef(performance.now());
      const rafRef = useRef(0);

      useEffect(() => { setPlaying(t.autoPlay); }, [t.autoPlay]);

      useEffect(() => {
        if (!playing) return;
        lastTickRef.current = performance.now();
        const tick = (now) => {
          const dt = (now - lastTickRef.current) * speed;
          lastTickRef.current = now;
          setElapsed((prev) => {
            const cur = scenes[sceneIdx];
            const next = prev + dt;
            if (next >= cur.dur && sceneIdx < scenes.length - 1) {
              setSceneIdx((s) => Math.min(scenes.length - 1, s + 1));
              return 0;
            }
            return Math.min(next, cur.dur);
          });
          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafRef.current);
      }, [playing, sceneIdx, scenes, speed]);

      const totalDur = scenes.slice(0, -1).reduce((a, s) => a + s.dur, 0);
      const progressMs = scenes.slice(0, sceneIdx).reduce((a, s) => a + s.dur, 0) + Math.min(elapsed, scenes[sceneIdx]?.dur ?? 0);
      const progressPct = sceneIdx >= scenes.length - 1 ? 100 : (progressMs / totalDur) * 100;

      const goTo = useCallback((i) => {
        setSceneIdx(Math.max(0, Math.min(scenes.length - 1, i)));
        setElapsed(0);
      }, [scenes.length]);
      const next = useCallback(() => goTo(sceneIdx + 1), [goTo, sceneIdx]);
      const prev = useCallback(() => goTo(sceneIdx - 1), [goTo, sceneIdx]);
      const replay = useCallback(() => { setSceneIdx(0); setElapsed(0); setPlaying(true); }, []);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next(); }
          else if (e.key === "ArrowLeft") { e.preventDefault(); prev(); }
          else if (e.key === "Escape") setPlaying(false);
          else if (e.key === "r" || e.key === "R") replay();
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [next, prev, replay]);

      const isFinal = sceneIdx === scenes.length - 1;
      const studentName = t.studentName || "Ava";
      const totalSec = Math.round(totalDur / 1000);

      return (
        <div className="relative w-full h-full overflow-hidden">
          <Background variant={t.variant} />

          <div className="topbar">
            <div className="flex items-center gap-3">
              <a href="index.html" className="pill" style={{ textDecoration: "none", color: "rgba(234,242,255,.92)" }}>← Home</a>
              <div className="flex items-center gap-3 pill" style={{ background: "rgba(15,23,42,.4)" }}>
                <BrandMark size={18} />
                <span style={{ fontSize: "13px", color: "#ffffff", fontWeight: 700, letterSpacing: ".10em", textTransform: "uppercase" }}>Executive Summary</span>
                <span style={{ width: 1, height: 10, background: "rgba(255,255,255,.15)" }} />
                <span className="micro tabular-nums" style={{ color: "rgba(203,213,245,.55)" }}>
                  {String(sceneIdx + 1).padStart(2, "0")} / {String(scenes.length).padStart(2, "0")}
                </span>
              </div>
            </div>
            <button className="pill" onClick={() => goTo(scenes.length - 1)}>Skip to summary →</button>
          </div>

          <div className="absolute inset-0">
            <ScenePreflight active={sceneIdx === 0} />
            <SceneHero active={sceneIdx === 1} score={t.score} studentName={studentName} />
            <SceneTier active={sceneIdx === 2} score={t.score} />
            <SceneLegend active={sceneIdx === 3} />
            <ScenePillars active={sceneIdx === 4} />
            <ScenePercentile active={sceneIdx === 5} studentName={studentName} />
            <SceneMatches active={sceneIdx === 6} />
            <SceneProgress active={sceneIdx === 7} />
            <SceneWhatIf active={sceneIdx === 8} />
            <SceneLever active={sceneIdx === 9} />
            <SceneInsight active={sceneIdx === 10} studentName={studentName} />
            <SceneExec active={sceneIdx === 11} studentName={studentName} score={t.score} onReplay={replay} />
          </div>

          <div className={`chrome ${isFinal ? "hidden" : ""}`}>
            <button className="pill" style={{ width: 40, padding: 0, height: 36, display: "grid", placeItems: "center" }} onClick={() => setPlaying(p => !p)} aria-label={playing ? "Pause" : "Play"}>
              {playing ? (
                <svg width="10" height="12" viewBox="0 0 10 12"><rect x="0" y="0" width="3" height="12" fill="currentColor" /><rect x="7" y="0" width="3" height="12" fill="currentColor" /></svg>
              ) : (
                <svg width="10" height="12" viewBox="0 0 10 12"><path d="M0 0L10 6L0 12V0Z" fill="currentColor" /></svg>
              )}
            </button>
            <button className="pill" style={{ padding: "0 10px", height: 36 }} onClick={prev}>←</button>
            <div className="scrub" onClick={(e) => {
              const r = e.currentTarget.getBoundingClientRect();
              const pct = (e.clientX - r.left) / r.width;
              const target = pct * totalDur;
              let acc = 0, i = 0;
              for (; i < scenes.length - 1; i++) {
                if (acc + scenes[i].dur > target) break;
                acc += scenes[i].dur;
              }
              setSceneIdx(i); setElapsed(target - acc);
            }}>
              <div className="scrub-fill" style={{ width: `${progressPct}%` }} />
              {scenes.slice(1, -1).map((s, i) => {
                const accSum = scenes.slice(0, i + 1).reduce((a, x) => a + x.dur, 0);
                return <div key={i} className="scrub-marker" style={{ left: `${(accSum / totalDur) * 100}%` }} />;
              })}
            </div>
            <button className="pill" style={{ padding: "0 10px", height: 36 }} onClick={next}>→</button>
            <span className="micro tabular-nums ml-2" style={{ color: "rgba(203,213,245,.55)", minWidth: 76, textAlign: "right" }}>
              {Math.floor(progressMs / 1000).toString().padStart(2, "0")}s / {totalSec}s · {scenes[sceneIdx]?.label}
            </span>
          </div>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Variant" />
            <TweakRadio label="Background" value={t.variant} options={["aurora", "starfield", "grid"]} onChange={(v) => setTweak("variant", v)} />
            <TweakRadio label="Accent" value={t.accent} options={["cyan", "violet", "amber"]} onChange={(v) => setTweak("accent", v)} />

            <TweakSection label="Content" />
            <TweakSlider label="Score" value={t.score} min={0} max={100} step={1} onChange={(v) => setTweak("score", v)} />
            <TweakText label="Student" value={t.studentName} onChange={(v) => setTweak("studentName", v)} />

            <TweakSection label="Playback" />
            <TweakToggle label="Auto-play" value={t.autoPlay} onChange={(v) => setTweak("autoPlay", v)} />
            <TweakSlider label="Speed" value={t.speed} min={0.5} max={2} step={0.25} unit="×" onChange={(v) => setTweak("speed", v)} />
            <TweakButton label="Replay from start" onClick={replay} />
            <TweakButton label="Jump to summary" onClick={() => goTo(scenes.length - 1)} />
          </TweaksPanel>
        </div>
      );
    }

    try {
      ReactDOM.createRoot(document.getElementById("root")).render(
        <ErrorBoundary>
          <PresentationMode />
        </ErrorBoundary>
      );
    } catch (e) {
      document.getElementById("root").innerHTML =
        '<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#020617;color:white;padding:40px;text-align:center;">'
        + '<div style="font-size:32px;margin-bottom:16px">⚠️</div>'
        + '<div style="font-size:20px;font-weight:700;margin-bottom:12px">Could not load your summary</div>'
        + '<div style="font-size:13px;color:rgba(203,213,245,.6);max-width:480px;margin-bottom:32px">' + e.message + '</div>'
        + '<a href="student-workplace.html" style="padding:10px 24px;border-radius:999px;background:rgba(34,211,238,.15);border:1px solid rgba(34,211,238,.4);color:#22d3ee;text-decoration:none;font-size:14px">← Back to workspace</a>'
        + '</div>';
    }
  </script>

</body>

</html>
